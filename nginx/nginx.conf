##
## ISMS Production Nginx Reverse Proxy
##
## Key concerns addressed:
##  1. SSE connections (match events, notifications, session kick stream) need
##     long timeouts — default Nginx 60s will kill them constantly.
##  2. proxy_buffering must be OFF for SSE so events are forwarded immediately.
##  3. WebSocket upgrade headers are included in case WS is used later.
##

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    # ── Main server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # --- Frontend (Next.js) ---
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support (Next.js HMR in dev, future WS features)
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }

        # --- Backend API ---
        # /api/* is already rewritten to /* by Next.js rewrites, but this block
        # handles direct access (Swagger docs, health checks, admin tooling).
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
        }

        # --- SSE endpoints (long-lived HTTP streams) ---
        # These paths stream events indefinitely; standard 60s timeout kills them.
        # Covers: match events, tournament events, notifications, session kick,
        #         lobby presence, and open-play queue.
        location ~ ^(/api)?/(matches/[^/]+/stream|tournaments/[^/]+/stream|players/me/notifications/stream|auth/session/stream|lobby/[^/]+/stream|open-play/[^/]+/stream) {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Critical for SSE: disable buffering so chunks reach the client immediately
            proxy_buffering    off;
            proxy_cache        off;

            # Hold the connection open for up to 1 hour; match + timeout buffer
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;

            # Tell Nginx not to close idle SSE connections
            proxy_ignore_client_abort off;
        }
    }
}
